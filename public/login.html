<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vinland Saga | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./styles/style.css">
    <link rel=" icon" href="./assets/vinland_saga/icons/icon_viland_saga.png"">
    <link rel=" preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <!--header inicio-->
    <div class="header">
        <div class="container">
            <h1 class="titulo">Vinland Saga</h1>
            <ul class="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="sobreNos.html">Sobre mim</a></li>
                <li class="agora"><a href="login.html" class="btn-login">Login</a></li>
                <li><a href="cadastro.html" class="btn-cadastro">Cadastro</a></li>
            </ul>
        </div>
    </div>
    <!--header fim-->


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class="card card-login">
                <h2>Bem vindo Guerreiro!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/vinland_saga/gifs/thoffin-gif.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </div>

    <!--footer inicio-->
    <div class="footer">
        <div class="container">
            <h4>Feito com amor por aluno Guilherme Barbosa De Albuquerque &hearts; SPTech &copy; 2026</h4>
            <span class="version">v1.0.0</span>
        </div>
    </div>
    <!--footer fim-->

</body>

</html>

<script>

    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Preencha todos os campos";

            finalizarAguardar();
            return false;
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        })

            .then(function (resposta) {

                if (resposta.ok) {

                    resposta.json().then(function (json) {

                        var dadosUsuario = [];

                        dadosUsuario.push(json);

                        var loginValido = false;

                        for (var i = 0; i < dadosUsuario.length; i++) {

                            if (
                                emailVar == dadosUsuario[i].email &&
                                senhaVar == dadosUsuario[i].senha
                            ) {

                                loginValido = true;

                                sessionStorage.EMAIL_USUARIO = dadosUsuario[i].email;
                                sessionStorage.NOME_USUARIO = dadosUsuario[i].nome;
                                sessionStorage.ID_USUARIO = dadosUsuario[i].id;

                                break;
                            }
                        }

                        if (loginValido) {

                            cardErro.style.display = "block";
                            mensagem_erro.innerHTML = "Login realizado com sucesso!";

                            setTimeout(function () {
                                window.location = "./dashboard/cards.html";
                            }, 2000);

                        } else {

                            cardErro.style.display = "block";
                            mensagem_erro.innerHTML = "E-mail ou senha inválidos";

                            finalizarAguardar();
                        }

                    });

                } else {

                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = "Usuário não encontrado";

                    finalizarAguardar();
                }

            })

            .catch(function (erro) {
                console.log(erro);
                finalizarAguardar();
            });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
