<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinland Saga - Quiz</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <main class="layout-quiz">


        <section id="containerQuiz">

            <section class="container-titulo-quiz">

                <div class="conteudo-titulo-quiz">

                    <h1 class="titulo-quiz">
                        <span>Quem é você em vinland Saga?</span>
                    </h1>

                </div>

            </section>


            <p class="subtitulo-quiz">
                Responda as perguntas e prove seu conhecimento
            </p>
                   <input type="radio" id="alternativaQuatro" name="alternativa" class="radio-quiz"
                        value="alternativaD">
            <div id="containerPerguntaAtual" class="container-pergunta-quiz">

                <span id="textoPerguntaAtual" class="pergunta-quiz texto-negrito">Lorem, ipsum dolor sit amet
                    consectetur adipisicing elit. Veniam nam velit quidem ea.</span>

            </div>

            <div id="informacoesAlternativas" class="informacoes-alternativas">

                <span class="texto-info-alternativas">
                    <em>Escolha uma opção abaixo:</em>
                </span>

            </div>

            <div id="containerAlternativas" class="container-alternativas flex-colunar">

                <div class="item-alternativa-quiz" onclick="responder(1)">

                    <input type="radio" id="alternativaUm" name="alternativa" class="radio-quiz" value="alternativaA">

                    <label for="alternativaUm" class="opcao-quiz" id="textoAlternativaUm">Lorem ipsum dolor sit amet
                        consectetur adipisicing elit.</label>

                </div>

                <div class="item-alternativa-quiz" onclick="responder(2)" >

                    <input type="radio" id="alternativaDois" name="alternativa" class="radio-quiz" value="alternativaB">

                    <label for="alternativaDois" class="opcao-quiz" id="textoAlternativaDois">Lorem ipsum dolor sit amet
                        consectetur.</label>

                </div>

                <div class="item-alternativa-quiz" onclick="responder(3)" >

                    <input type="radio" id="alternativaTres" name="alternativa" class="radio-quiz" value="alternativaC">

                    <label for="alternativaTres" class="opcao-quiz" id="textoAlternativaTres">Lorem ipsum dolor sit amet
                        consectetur.</label>

                </div>

                <div class="item-alternativa-quiz" onclick="responder(4)" >

                    <input type="radio" id="alternativaQuatro" name="alternativa" class="radio-quiz"
                        value="alternativaD">

                    <label for="alternativaQuatro" class="opcao-quiz" id="textoAlternativaQuatro">Lorem ipsum dolor sit
                        amet consectetur.</label>

                </div>

            </div>

            <div id="containerBotoesQuiz" class="container-botoes-quiz flex-colunar">

                <button id="botaoSubmeterResposta" class="botao-quiz">
                    Responder
                </button>

                <!-- <button id="botaoFinalizarQuiz" class="botao-quiz" disabled>
                    Finalizar Quiz
                </button> -->

            </div>

        </section>

    </main>

</body>

<script src="../js/quiz.js"></script>
</html>
