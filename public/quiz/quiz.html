<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vinland Saga - Quiz</title>

    <link rel="stylesheet" href="styleQuiz.css">
    <link rel="icon" href="../assets/vinland_saga/icons/icon_viland_saga.png" />
    <script src="../js/quiz.js" defer></script>

</head>

<body>

    <main class="layout-quiz">

        <div id="containerQuiz">

            <div class="container-titulo-quiz">

                <div class="conteudo-titulo-quiz">

                    <h1 class="titulo-quiz">

                        <span>
                            Quem é você em Vinland Saga?
                        </span>

                    </h1>

                </div>

            </div>


            <p class="subtitulo-quiz">

                Responda as perguntas e descubra
                qual personagem e personalidade
                mais combinam com você.

            </p>


            <div id="containerPerguntaAtual" class="container-pergunta-quiz">

                <span id="pergunta" class="pergunta-quiz texto-negrito">

                    Pergunta do quiz

                </span>

            </div>


            <div id="informacoesAlternativas" class="informacoes-alternativas">

                <span class="texto-info-alternativas">

                    <em>
                        Escolha uma opção abaixo:
                    </em>

                </span>

            </div>


            <div id="containerAlternativas" class="container-alternativas">

                <label class="item-alternativa-quiz" onclick="responderPergunta(1)">

                    <input type="radio" id="alternativaUm" name="alternativa" class="radio-quiz">

                    <span class="opcao-quiz questNumberText" id="primeiraQuestao">

                        Alternativa 1

                    </span>

                </label>


                <label class="item-alternativa-quiz" onclick="responderPergunta(2)">

                    <input type="radio" id="alternativaDois" name="alternativa" class="radio-quiz">

                    <span class="opcao-quiz questNumberText" id="segundaQuestao">

                        Alternativa 2

                    </span>

                </label>


                <label class="item-alternativa-quiz" onclick="responderPergunta(3)">

                    <input type="radio" id="alternativaTres" name="alternativa" class="radio-quiz">

                    <span class="opcao-quiz questNumberText" id="terceiraQuestao">

                        Alternativa 3

                    </span>

                </label>


                <label class="item-alternativa-quiz" onclick="responderPergunta(4)">

                    <input type="radio" id="alternativaQuatro" name="alternativa" class="radio-quiz">

                    <span class="opcao-quiz questNumberText" id="quartaQuestao">

                        Alternativa 4

                    </span>

                </label>

            </div>


            <div id="containerBotoesQuiz">

                <button id="botaoResponder" class="botao-quiz" onclick="avancarPergunta()">

                    Responder

                </button>

            </div>


            <div id="containerResultado" class="container-resultado-quiz">

                <h2 id="resultadoPersonagem"></h2>

                <p id="resultadoPersonalidade"></p>

                <span id="resultadoFrase"></span>

            </div>

        </div>

    </main>

</body>

</html>
